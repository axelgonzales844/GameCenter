<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'game/css/style.css' %}">
</head>
<body>
            <div class="header-nav" style="background-color: var(--crema-bloque); border-bottom: 1px solid #222;">
                <div class="brand-logo">GAME CENTER <span style="font-weight: 300; color: var(--teal-medio);">| SUITE</span></div>
            </div>
            <div class="dashboard-container">
                <div style="font-size: 20px; font-weight: 800; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid var(--teal-medio);">Modificar o dar de Alta Producto</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 900px;">
                    <div>
                        <div class="group-field">
                            <label class="field-label">Nombre del Componente</label>
                            <input type="text" class="field-control" placeholder="ej. Kit de Simulación G Master">
                        </div>
                        <div class="group-field">
                            <label class="field-label">SKU / Clasificación</label>
                            <select class="field-control" style="color: #ffffff;">
                                <option>Simulación Avanzada</option>
                                <option>Audio Inmersivo</option>
                                <option>Mobiliario Pro</option>
                            </select>
                        </div>
                        <div class="group-field">
                            <label class="field-label">Costo Comercial ($ MXN)</label>
                            <input type="number" class="field-control" placeholder="7999.00">
                        </div>
                    </div>
                    <div>
                        <div class="group-field">
                            <label class="field-label">Especificaciones Técnicas</label>
                            <textarea class="field-control" rows="5" placeholder="Detalles de materiales, compatibilidad..." style="resize: none;"></textarea>
                        </div>
                        <div class="group-field">
                            <label class="field-label">Existencia Inicial Almacén</label>
                            <input type="number" class="field-control" placeholder="5">
                        </div>
                    </div>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 40px; max-width: 900px; justify-content: flex-end;">
                    <button class="action-button btn-action-secondary" style="width: 150px;">Descartar</button>
                    <button class="action-button btn-action-primary" style="width: 250px;">Guardar Cambios</button>
                </div>
            </div>
</body>
</html>
