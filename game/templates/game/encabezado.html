<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Game Center{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'game/css/style.css' %}">
    <script src="{% static 'game/js/script.js' %}"></script>
</head>
<body>
    <div class="catalog2-wrapper">
        <!-- Header -->
        <div class="catalog2-header">
            <div class="catalog2-header-top">
                <div class="catalog2-title">
                    GAME<span>CENTER</span>
                </div>
                <nav class="catalog2-nav">
                    <!-- Creamos bloques personalizados para las clases activas -->
                    <a href="{% url 'altaproducto' %}" class="nav-link {% block active_alta %}{% endblock %}">Subir Producto</a>
                    <a href="{% url 'control'%}" class="nav-link {% block active_control %}{% endblock %}">Control</a>
                    <a href="{% url 'catalogo' %}" class="nav-link {% block active_catalogo %}{% endblock %}">Catálogo</a>
                    <a href="{% url 'carrito' %}" class="nav-link {% block active_carrito  %}{% endblock %}">Carrito</a>
                    <a href="{% url 'opiniones' %}" class="nav-link {% block active_opiniones %}{% endblock %}">Opiniones</a>
                    
                    <!-- <a href="{% url 'login' %}" class="nav-link {% block active_login %}{% endblock %}">Login</a> -->
                    <!-- <a href="{% url 'registro' %}" class="nav-link {% block active_registro %}{% endblock %}">Registro</a> -->
                    
                </nav>
            </div> <!-- CORREGIDO: Faltaba cerrar el header-top -->
        </div> <!-- CORREGIDO: Faltaba cerrar el catalog2-header -->

        {% block contenido %}
        {% endblock %}
        
    </div> <!-- CORREGIDO: Cierre del catalog2-wrapper para envolver el contenido -->
</body>
</html>
