<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Center - Alta de Producto</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'game/css/style.css' %}">
</head>
<body>
    <div class="container-wrapper">
        <div class="window-canvas">
            <div class="header-nav header-nav-bordered">
                <div class="brand-logo">GAME CENTER <span style="font-weight: 300; color: var(--teal-medio);">| SUITE</span></div>
            </div>
            <div class="dashboard-container">
                <div class="title-section">Modificar o dar de Alta Producto</div>
                
                {% if messages %}
                <div class="messages-container">
                    {% for message in messages %}
                        <div class="message-item {% if 'success' in message.tags %}success{% else %}error{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
                {% endif %}
                
                <form method="POST" class="form-grid">
                    {% csrf_token %}
                    <div>
                        <div class="group-field">
                            <label class="field-label">Nombre del Componente</label>
                            <input type="text" name="nombre" class="field-control" placeholder="ej. Kit de Simulación G Master" required>
                        </div>
                        <div class="group-field">
                            <label class="field-label">SKU / Clasificación</label>
                            <select name="clasificacion" class="field-control">
                                <option value="SIM_AVANZADA">Simulación Avanzada</option>
                                <option value="AUDIO_INMERSIVO">Audio Inmersivo</option>
                                <option value="MOBILIARIO_PRO">Mobiliario Pro</option>
                            </select>
                        </div>
                        <div class="group-field">
                            <label class="field-label">Costo Comercial ($ MXN)</label>
                            <input type="number" name="costo_comercial" class="field-control" placeholder="7999.00" step="0.01" required>
                        </div>
                    </div>
                    <div>
                        <div class="group-field">
                            <label class="field-label">Especificaciones Técnicas</label>
                            <textarea name="especificaciones_tecnicas" class="field-control textarea-no-resize" rows="5" placeholder="Detalles de materiales, compatibilidad..."></textarea>
                        </div>
                        <div class="group-field">
                            <label class="field-label">Existencia Inicial Almacén</label>
                            <input type="number" name="existencia_inicial" class="field-control" placeholder="5" required>
                        </div>
                    </div>
                    
                    <div class="form-buttons">
                        <button type="reset" class="action-button btn-action-secondary btn-reset">Descartar</button>
                        <button type="submit" class="action-button btn-action-primary btn-submit">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div> 
</body>
</html>
